services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: '3000'
      ZOOMIES_STATE_DIR: /var/lib/zoomies
      ZOOMIES_CERT_DIR: /var/lib/zoomies/certs
      ZOOMIES_NGINX_SITES_DIR: /etc/zoomies/nginx/sites
      ZOOMIES_NGINX_PIDFILE: /run/zoomies-nginx/nginx.pid
      # ZOOMIES_API_TOKEN, ZOOMIES_ACME_EMAIL, ZOOMIES_ACME_DIRECTORY_URL
      # are required at runtime — supply via `docker compose --env-file` or
      # an environment block in an override file.
    expose:
      - '3000'
    # Share NGINX's PID namespace so signal-based reload (`kill -HUP` on
    # the master pid read from $ZOOMIES_NGINX_PIDFILE) reaches the running
    # NGINX master from this container.
    pid: 'service:nginx'
    depends_on:
      - nginx
    volumes:
      - zoomies-state:/var/lib/zoomies
      - zoomies-certs:/var/lib/zoomies/certs
      - zoomies-sites:/etc/zoomies/nginx/sites
      - zoomies-runtime:/run/zoomies-nginx

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ['node', 'dist/server/worker/main.js']
    depends_on:
      - nginx
    environment:
      NODE_ENV: production
      ZOOMIES_STATE_DIR: /var/lib/zoomies
      ZOOMIES_CERT_DIR: /var/lib/zoomies/certs
      ZOOMIES_NGINX_SITES_DIR: /etc/zoomies/nginx/sites
      ZOOMIES_NGINX_PIDFILE: /run/zoomies-nginx/nginx.pid
      # When set, the worker seeds a "demo" site on first boot so the proxy
      # is immediately usable. Defaults to the dashboard itself so
      # `docker compose up` yields a working HTTPS reverse proxy with no
      # extra configuration. Unset to disable, or change to point at any
      # http://host:port reachable from this container.
      ZOOMIES_DEMO_UPSTREAM: http://app:3000
      ZOOMIES_DEMO_HOSTNAME: localhost
      # The default cert paths the snakeoil entrypoint writes to. Used both
      # by the seeded demo site row and by the NGINX 443 default_server
      # fallback in deploy/nginx/conf.d/default.conf.
      ZOOMIES_DEFAULT_CERT_PEM: /var/lib/zoomies/certs/_default/fullchain.pem
      ZOOMIES_DEFAULT_CERT_KEY: /var/lib/zoomies/certs/_default/privkey.pem
      # Required: ZOOMIES_ACME_EMAIL, ZOOMIES_API_TOKEN.
      # Optional: ZOOMIES_ACME_DIRECTORY_URL (defaults to LE production).
    # Shared PID namespace lets the worker signal NGINX directly. See
    # `app` service above for the full rationale.
    pid: 'service:nginx'
    volumes:
      # Share state with `app` so the cert table + cert files + ACME
      # challenge dir live in one place. HTTP-01 challenges land under
      # /var/lib/zoomies/acme; NGINX serves them on port 80.
      - zoomies-state:/var/lib/zoomies
      - zoomies-certs:/var/lib/zoomies/certs
      - zoomies-sites:/etc/zoomies/nginx/sites
      - zoomies-runtime:/run/zoomies-nginx

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      # `docker-entrypoint.d/*.sh` runs before NGINX starts in the official
      # image. The script here generates a self-signed snakeoil cert under
      # /var/lib/zoomies/certs/_default/ if one is not already present so
      # NGINX can bind 443 before any per-site cert is rendered.
      - ./deploy/nginx/docker-entrypoint.d/10-zoomies-snakeoil.sh:/docker-entrypoint.d/10-zoomies-snakeoil.sh:ro
      - zoomies-certs:/var/lib/zoomies/certs
      - zoomies-state:/var/lib/zoomies
      - zoomies-sites:/etc/zoomies/nginx/sites:ro
      - zoomies-runtime:/run/zoomies-nginx
      - zoomies-logs:/var/log/nginx

volumes:
  zoomies-certs:
  zoomies-logs:
  zoomies-state:
  zoomies-sites:
  zoomies-runtime:
