name: Release

# Triggered when a maintainer pushes a `vX.Y.Z` tag. The job verifies the
# tag against the full CI matrix, then publishes two artifacts in parallel:
#   1. The CLI package to npm as `@yannelli/zoomies`.
#   2. The runtime container image to GHCR at
#      `ghcr.io/yannelli/zoomies:<tag>` (and `:latest`).
#
# `main` is intentionally pinned at version 0.0.0; both publish jobs run
# `scripts/set-version.mjs` first to stamp the tag version into
# package.json, src/version.ts, and src/lib/version.ts before building.
#
# Required repository secrets:
#   NPM_TOKEN  An npm `automation` token scoped to publish the
#              `@yannelli/zoomies` package.
#
# GHCR auth uses the workflow's built-in GITHUB_TOKEN — no extra secret
# needed, but the workflow must request `packages: write`.

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  npm-publish:
    name: Publish to npm
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Stamp version from tag
        run: node scripts/set-version.mjs "${GITHUB_REF_NAME#v}"

      - name: Build CLI artifacts
        run: pnpm build:cli

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker-publish:
    name: Publish to GHCR
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Stamp version from tag
        run: node scripts/set-version.mjs "${GITHUB_REF_NAME#v}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/yannelli/zoomies:${{ github.ref_name }}
            ghcr.io/yannelli/zoomies:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
