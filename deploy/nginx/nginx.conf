worker_processes auto;

# Pidfile lives on the shared `zoomies-runtime` volume so the control
# plane (running in a sibling container with `pid: service:nginx`) can
# read the master pid and send SIGHUP to trigger a graceful reload. The
# directory is created by deploy/nginx/docker-entrypoint.d/10-zoomies-snakeoil.sh.
pid /run/zoomies-nginx/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  server_tokens off;

  # Static defaults (HTTP fallback + 443 snakeoil default_server) ship
  # in the image's conf.d. Per-site config rendered by Zoomies lands in
  # the managed sites dir below and is included after the defaults so
  # site-specific `server_name` blocks shadow the catch-all `_` server.
  include /etc/nginx/conf.d/*.conf;
  include /etc/zoomies/nginx/sites/*.conf;
}
