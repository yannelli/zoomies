upstream zoomies_app {
  server app:3000;
  keepalive 32;
}

# Catch-all HTTP server. Routes unknown hosts to the dashboard so the app
# is reachable before any per-site config has been rendered, and serves
# ACME HTTP-01 challenges out of the shared state dir.
server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  location /.well-known/acme-challenge/ {
    root /var/lib/zoomies/acme;
  }

  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_pass http://zoomies_app;
  }
}

# Catch-all HTTPS server. Needed so NGINX can bind 443 at startup even
# when no rendered site exists yet — without a default_server on 443 the
# socket would only open once a per-site `listen 443 ssl` block was
# rendered, which is exactly the chicken-and-egg the snakeoil cert
# exists to break. The cert files are generated on first startup by
# deploy/nginx/docker-entrypoint.d/10-zoomies-snakeoil.sh.
server {
  listen 443 ssl default_server;
  listen [::]:443 ssl default_server;
  server_name _;

  ssl_certificate /var/lib/zoomies/certs/_default/fullchain.pem;
  ssl_certificate_key /var/lib/zoomies/certs/_default/privkey.pem;

  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_pass http://zoomies_app;
  }
}
