# managed-by zoomies — site:aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa  upstream:bbbbbbbb-bbbb-4bbb-8bbb-bbbbbbbbbbbb
upstream zoomies_aaaaaaaa_aaaa_4aaa_8aaa_aaaaaaaaaaaa {
    server 10.0.3.1:8080 weight=1;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name manual.example.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name manual.example.com;
    ssl_certificate /var/lib/zoomies/certs/manual.example.com.pem;
    ssl_certificate_key /var/lib/zoomies/certs/manual.example.com.key;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_pass http://zoomies_aaaaaaaa_aaaa_4aaa_8aaa_aaaaaaaaaaaa;
    }
}
